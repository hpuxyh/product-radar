name: GitHub New Projects Radar

on:
  push:
    branches: [main, master]
  schedule:
    # Roughly every 2 days at 08:00 CST (00:00 UTC).
    - cron: "0 0 */2 * *"
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  new-projects:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run GitHub new-project radar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIGEST_REPO: ${{ github.repository }}
          NEW_PROJECTS_CREATE_ISSUE: "true"
        run: pnpm new-projects

      - name: Update web manifest and RSS
        run: |
          pnpm manifest
          pnpm new-projects:embed

      - name: Commit generated report
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add digests/ manifest.json feed.xml new-projects.html
          if git diff --cached --quiet; then
            echo "No new project report changes to commit"
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "digest: ${DATE} new projects radar"
            git pull --rebase
            git push
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare Pages artifact
        run: |
          rm -rf site-dist
          mkdir -p site-dist
          cp index.html new-projects.html manifest.json feed.xml site-dist/
          cp -R digests site-dist/digests
          if [ -d assets ]; then cp -R assets site-dist/assets; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site-dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
