<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub 新项目雷达</title>
    <link rel="preconnect" href="https://avatars.githubusercontent.com" />
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7fb;
        --panel: #ffffff;
        --panel-soft: #eef5f3;
        --text: #172033;
        --muted: #667085;
        --subtle: #98a2b3;
        --border: #d8dee8;
        --border-strong: #b8c2d4;
        --green: #0f8b6f;
        --green-soft: #dff3ed;
        --blue: #2563eb;
        --blue-soft: #e5edff;
        --amber: #b26a00;
        --amber-soft: #fff0d6;
        --red: #c24141;
        --shadow: 0 16px 44px rgba(23, 32, 51, 0.08);
        --radius: 8px;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: linear-gradient(180deg, rgba(37, 99, 235, 0.06), transparent 260px), var(--bg);
        color: var(--text);
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          "PingFang SC",
          "Microsoft YaHei",
          sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app-shell {
        width: min(1440px, 100%);
        margin: 0 auto;
        padding: 18px 20px 40px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        min-height: 52px;
        padding-bottom: 16px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        min-width: 0;
      }

      .brand-mark {
        display: grid;
        width: 36px;
        height: 36px;
        place-items: center;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        color: var(--green);
        box-shadow: 0 8px 24px rgba(15, 139, 111, 0.12);
      }

      .brand-mark svg,
      .icon svg {
        width: 18px;
        height: 18px;
        stroke-width: 2;
      }

      h1 {
        margin: 0;
        font-size: clamp(22px, 2.4vw, 32px);
        line-height: 1.15;
        letter-spacing: 0;
      }

      .brand-meta {
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .top-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 8px;
        flex-wrap: wrap;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 7px;
        min-height: 36px;
        padding: 0 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--panel);
        color: var(--text);
        cursor: pointer;
        white-space: nowrap;
        transition:
          border-color 0.15s ease,
          color 0.15s ease,
          box-shadow 0.15s ease;
      }

      .btn:hover {
        border-color: var(--border-strong);
        box-shadow: 0 8px 20px rgba(23, 32, 51, 0.08);
      }

      .btn.primary {
        border-color: rgba(15, 139, 111, 0.3);
        background: var(--green);
        color: #fff;
      }

      .dashboard {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 18px;
        align-items: start;
      }

      .sidebar,
      .main-panel {
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow);
      }

      .sidebar {
        position: sticky;
        top: 16px;
        padding: 16px;
      }

      .control-block + .control-block {
        margin-top: 16px;
        padding-top: 16px;
        border-top: 1px solid var(--border);
      }

      .label {
        display: block;
        margin-bottom: 7px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .input,
      .select {
        width: 100%;
        min-height: 40px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
        color: var(--text);
      }

      .input {
        padding: 0 11px;
      }

      .select {
        padding: 0 36px 0 11px;
      }

      .input:focus,
      .select:focus {
        outline: none;
        border-color: var(--green);
        box-shadow: 0 0 0 3px rgba(15, 139, 111, 0.14);
      }

      .segments {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
      }

      .segment {
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
        color: var(--muted);
        cursor: pointer;
      }

      .segment.active {
        border-color: rgba(15, 139, 111, 0.36);
        background: var(--green-soft);
        color: #075f4e;
        font-weight: 700;
      }

      .metric-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }

      .metric {
        min-height: 78px;
        padding: 11px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .metric .value {
        display: block;
        margin-bottom: 4px;
        font-size: 24px;
        font-weight: 800;
        line-height: 1.1;
      }

      .metric .name {
        color: var(--muted);
        font-size: 12px;
      }

      .main-panel {
        overflow: hidden;
      }

      .summary-strip {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 18px;
        border-bottom: 1px solid var(--border);
        background: linear-gradient(90deg, #ffffff, var(--panel-soft));
      }

      .summary-title {
        margin: 0 0 4px;
        font-size: 18px;
        line-height: 1.25;
      }

      .summary-text {
        margin: 0;
        color: var(--muted);
        font-size: 13px;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        min-height: 32px;
        padding: 0 10px;
        border: 1px solid rgba(37, 99, 235, 0.2);
        border-radius: var(--radius);
        background: var(--blue-soft);
        color: #1d4ed8;
        font-size: 12px;
        font-weight: 700;
        white-space: nowrap;
      }

      .content-area {
        padding: 18px;
      }

      .guide-section {
        margin-bottom: 18px;
        padding: 15px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .guide-section h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
      }

      .guide-intro {
        margin: 6px 0 12px;
        color: var(--muted);
        font-size: 13px;
      }

      .guide-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 10px;
      }

      .guide-item {
        min-height: 100px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fbfcff;
      }

      .guide-item strong {
        display: block;
        margin-bottom: 6px;
        line-height: 1.25;
      }

      .guide-item span {
        display: block;
        color: var(--muted);
        font-size: 12px;
      }

      .watchlist {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 18px;
      }

      .leaderboard-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 16px;
        margin-bottom: 18px;
      }

      .board-section,
      .trend-section {
        min-width: 0;
      }

      .board-title {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .board-title h2,
      .trend-section h2 {
        margin: 0;
        font-size: 17px;
        line-height: 1.25;
      }

      .board-note,
      .trend-note {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .rank-list,
      .trend-grid {
        display: grid;
        gap: 8px;
      }

      .rank-card {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 112px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .rank-card:hover,
      .trend-card:hover {
        border-color: var(--border-strong);
      }

      .rank-index {
        display: grid;
        width: 30px;
        height: 30px;
        place-items: center;
        border-radius: var(--radius);
        background: var(--panel-soft);
        color: var(--green);
        font-weight: 800;
      }

      .rank-score {
        min-width: 64px;
        text-align: right;
      }

      .rank-score strong {
        display: block;
        font-size: 24px;
        line-height: 1;
      }

      .rank-score span {
        display: block;
        margin-top: 5px;
        color: var(--muted);
        font-size: 11px;
      }

      .mini-reasons {
        display: grid;
        gap: 4px;
        margin: 8px 0 0;
        padding: 0;
        color: #475467;
        font-size: 12px;
        list-style: none;
      }

      .mini-reasons li {
        overflow-wrap: anywhere;
      }

      .trend-section {
        margin-bottom: 18px;
      }

      .trend-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
        margin-top: 10px;
      }

      .trend-card {
        min-height: 118px;
        padding: 12px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .trend-card strong {
        display: block;
        margin-bottom: 6px;
        line-height: 1.25;
      }

      .trend-card p {
        margin: 0;
        color: var(--muted);
        font-size: 12px;
      }

      .watch-card {
        min-height: 172px;
        padding: 13px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .watch-card:hover,
      .project-card:hover {
        border-color: var(--border-strong);
      }

      .watch-head,
      .project-head {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .avatar {
        width: 38px;
        height: 38px;
        flex: 0 0 auto;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--blue-soft);
        object-fit: cover;
      }

      .avatar-fallback {
        display: grid;
        place-items: center;
        color: var(--blue);
        font-size: 13px;
        font-weight: 800;
      }

      .project-name {
        display: block;
        min-width: 0;
        overflow-wrap: anywhere;
        color: var(--text);
        font-weight: 800;
        line-height: 1.25;
      }

      .project-name:hover {
        color: var(--blue);
      }

      .card-meta {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .description {
        margin: 10px 0 0;
        color: #344054;
        font-size: 13px;
        line-height: 1.45;
      }

      .plain-summary {
        margin-top: 12px;
        padding: 11px;
        border: 1px solid #dfe7f1;
        border-radius: var(--radius);
        background: #fbfcff;
      }

      .plain-summary strong,
      .summary-label {
        display: block;
        margin-bottom: 5px;
        color: #182235;
        font-size: 12px;
        font-weight: 800;
      }

      .plain-summary p {
        margin: 0;
        color: #344054;
        font-size: 13px;
        line-height: 1.5;
      }

      .audience-line {
        margin-top: 7px;
        color: #667085;
        font-size: 12px;
      }

      .highlight-list {
        display: grid;
        gap: 5px;
        margin: 10px 0 0;
        padding: 0;
        color: #475467;
        font-size: 12px;
        list-style: none;
      }

      .highlight-list li {
        padding-left: 14px;
        position: relative;
      }

      .highlight-list li::before {
        position: absolute;
        left: 0;
        content: "·";
        color: var(--green);
        font-weight: 800;
      }

      .source-note {
        margin-top: 8px;
        color: var(--subtle);
        font-size: 11px;
      }

      .badges {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-top: 10px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        min-height: 24px;
        max-width: 100%;
        padding: 0 8px;
        border-radius: var(--radius);
        background: #f1f4f9;
        color: #475467;
        font-size: 12px;
        white-space: nowrap;
      }

      .badge.green {
        background: var(--green-soft);
        color: #075f4e;
      }

      .badge.blue {
        background: var(--blue-soft);
        color: #1d4ed8;
      }

      .badge.amber {
        background: var(--amber-soft);
        color: #8a5200;
      }

      .section-head {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 12px;
        margin: 10px 0 12px;
      }

      .section-head h2 {
        margin: 0;
        font-size: 17px;
        letter-spacing: 0;
      }

      .result-count {
        color: var(--muted);
        font-size: 13px;
        white-space: nowrap;
      }

      .project-list {
        display: grid;
        gap: 10px;
      }

      .project-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 210px;
        gap: 16px;
        padding: 15px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fff;
      }

      .scorebox {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        align-content: start;
      }

      .score-item {
        min-height: 58px;
        padding: 8px;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: #fbfcff;
      }

      .score-item strong {
        display: block;
        font-size: 18px;
        line-height: 1.1;
      }

      .score-item span {
        display: block;
        margin-top: 4px;
        color: var(--muted);
        font-size: 11px;
      }

      .reason-list {
        margin: 10px 0 0;
        padding-left: 18px;
        color: #475467;
        font-size: 13px;
      }

      .reason-list li {
        margin: 3px 0;
      }

      .empty {
        padding: 38px 18px;
        border: 1px dashed var(--border-strong);
        border-radius: var(--radius);
        background: #fff;
        color: var(--muted);
        text-align: center;
      }

      .error {
        padding: 18px;
        border: 1px solid rgba(194, 65, 65, 0.28);
        border-radius: var(--radius);
        background: #fff1f1;
        color: var(--red);
      }

      .loading {
        padding: 42px 18px;
        color: var(--muted);
        text-align: center;
      }

      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        padding: 0;
        margin: -1px;
        overflow: hidden;
        clip: rect(0, 0, 0, 0);
        white-space: nowrap;
        border: 0;
      }

      @media (max-width: 1180px) {
        .dashboard {
          grid-template-columns: 280px minmax(0, 1fr);
        }

        .watchlist,
        .guide-grid,
        .trend-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 860px) {
        .app-shell {
          padding: 14px 12px 32px;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .top-actions {
          width: 100%;
          justify-content: flex-start;
        }

        .dashboard {
          grid-template-columns: 1fr;
        }

        .sidebar {
          position: static;
        }

        .summary-strip {
          grid-template-columns: 1fr;
        }

        .project-card {
          grid-template-columns: 1fr;
        }

        .scorebox {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }

        .leaderboard-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        .metric-grid,
        .watchlist,
        .guide-grid,
        .scorebox,
        .trend-grid {
          grid-template-columns: 1fr 1fr;
        }

        .rank-card {
          grid-template-columns: auto minmax(0, 1fr);
        }

        .rank-score {
          grid-column: 1 / -1;
          text-align: left;
        }

        .btn {
          flex: 1 1 auto;
        }

        .section-head {
          align-items: flex-start;
          flex-direction: column;
        }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M4 18V5" />
              <path d="M4 12h7" />
              <path d="M4 18h16" />
              <path d="m15 9 3-3 3 3" />
              <path d="M18 6v10" />
            </svg>
          </div>
          <div>
            <h1>新项目发现榜</h1>
            <div class="brand-meta" id="brandMeta">读取最新报告中</div>
          </div>
        </div>

        <nav class="top-actions" aria-label="页面导航">
          <a class="btn" href="./index.html">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="m15 18-6-6 6-6" />
              </svg>
            </span>
            全部报告
          </a>
          <a class="btn primary" id="markdownLink" href="#">
            <span class="icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                <path d="M14 2v6h6" />
                <path d="M8 13h8" />
                <path d="M8 17h5" />
              </svg>
            </span>
            文字版报告
          </a>
        </nav>
      </header>

      <main class="dashboard">
        <aside class="sidebar" aria-label="筛选">
          <div class="control-block">
            <label class="label" for="dateSelect">日期</label>
            <select class="select" id="dateSelect"></select>
          </div>

          <div class="control-block">
            <label class="label" for="searchInput">搜索</label>
            <input class="input" id="searchInput" type="search" placeholder="比如 AI、手机 App、设计" />
          </div>

          <div class="control-block">
            <label class="label" for="sortSelect">排序</label>
            <select class="select" id="sortSelect">
              <option value="ai">AI 可能会火</option>
              <option value="web">产品值得看</option>
              <option value="stars">收藏数</option>
              <option value="newest">最新创建</option>
              <option value="active">最近更新</option>
            </select>
          </div>

          <div class="control-block">
            <span class="label">分类</span>
            <div class="segments" id="categorySegments"></div>
          </div>

          <div class="control-block">
            <div class="metric-grid" id="metricGrid">
              <div class="metric"><span class="value">--</span><span class="name">本页项目</span></div>
              <div class="metric"><span class="value">--</span><span class="name">备选项目</span></div>
              <div class="metric"><span class="value">--</span><span class="name">手机/App</span></div>
              <div class="metric"><span class="value">--</span><span class="name">观察天数</span></div>
            </div>
          </div>
        </aside>

        <section class="main-panel" aria-live="polite">
          <div class="summary-strip">
            <div>
              <h2 class="summary-title" id="summaryTitle">正在整理这期项目</h2>
              <p class="summary-text" id="summaryText">
                这里会把最近值得看的 AI 工具、网站项目和手机 App 放在一起。
              </p>
            </div>
            <div class="status-pill" id="statusPill">GitHub 搜索数据</div>
          </div>
          <div class="content-area" id="contentArea">
            <div class="loading">加载中...</div>
          </div>
        </section>
      </main>

    <script>
      const state = {
        dates: [],
        selectedDate: "",
        data: null,
        query: "",
        category: "all",
        sort: "ai",
      };

      const els = {
        brandMeta: document.getElementById("brandMeta"),
        dateSelect: document.getElementById("dateSelect"),
        searchInput: document.getElementById("searchInput"),
        sortSelect: document.getElementById("sortSelect"),
        categorySegments: document.getElementById("categorySegments"),
        metricGrid: document.getElementById("metricGrid"),
        summaryTitle: document.getElementById("summaryTitle"),
        summaryText: document.getElementById("summaryText"),
        statusPill: document.getElementById("statusPill"),
        contentArea: document.getElementById("contentArea"),
        markdownLink: document.getElementById("markdownLink"),
      };

      const numberFmt = new Intl.NumberFormat("zh-CN");
      const compactFmt = new Intl.NumberFormat("zh-CN", { notation: "compact" });

      function escapeHtml(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function embeddedPayload() {
        const raw = document.getElementById("embedded-new-projects-data")?.textContent?.trim();
        if (!raw) return null;
        try {
          return JSON.parse(raw);
        } catch {
          return null;
        }
      }

      function dateOptions(dates) {
        return dates
          .map((entry) => `<option value="${escapeHtml(entry.date)}">${escapeHtml(entry.date)}</option>`)
          .join("");
      }

      function formatDate(value) {
        if (!value) return "-";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return value.slice(0, 10);
        return date.toISOString().slice(0, 10);
      }

      function relativeTime(value) {
        const t = Date.parse(value);
        if (!Number.isFinite(t)) return "-";
        const diffHours = Math.max(0, (Date.now() - t) / 36e5);
        if (diffHours < 24) return `${Math.max(1, Math.round(diffHours))} 小时前`;
        return `${Math.max(1, Math.round(diffHours / 24))} 天前`;
      }

      function projectText(project) {
        return [
          project.fullName,
          project.descriptionZh,
          project.audienceZh,
          ...(project.readmeHighlightsZh || []),
          project.summarySourceZh,
          project.language,
          project.categoryZh,
          ...(project.topics || []),
          ...(project.reasonsZh || []),
          ...(project.frontierReasonsZh || []),
          ...(project.webTrendReasonsZh || []),
          ...(project.trendLabelsZh || []),
        ]
          .join(" ")
          .toLowerCase();
      }

      function scoreValue(project, kind) {
        if (kind === "ai") return project.aiPotentialScore ?? project.score ?? 0;
        if (kind === "web") return project.webTrendScore ?? project.score ?? 0;
        return project.score ?? 0;
      }

      function uniqueText(values) {
        return [...new Set(values.filter(Boolean))];
      }

      function normalizeReasonKey(value) {
        return String(value || "")
          .replace(/^项目出现于.*$/, "时间")
          .replace(/^最近关注增长.*$/, "关注增长")
          .replace(/^有官网或演示.*$/, "演示")
          .replace(/^最近还在更新.*$/, "更新")
          .replace(/^它代表的趋势:\s*/, "趋势:")
          .replace(/^大致方向:\s*/, "方向:")
          .replace(/^大致归类:\s*/, "方向:")
          .replace(/^可能是:\s*/, "可能是:")
          .replace(/^看点:\s*/, "可能是:")
          .replace(/\s+/g, "");
      }

      function uniqueReasons(values) {
        const seen = new Set();
        const result = [];
        for (const value of values.map(friendlyReason).filter(Boolean)) {
          const key = normalizeReasonKey(value);
          if (seen.has(key)) continue;
          seen.add(key);
          result.push(value);
        }
        return result;
      }

      function friendlyReason(reason) {
        return String(reason || "")
          .replace("为什么可能会火:", "可能值得看:")
          .replace("属于这些方向:", "大致方向:")
          .replace("大家可能在做:", "它代表的趋势:")
          .replace("看起来像:", "可能是:")
          .replace("主要用:", "主要技术:")
          .replace("受欢迎速度: 约", "最近关注增长: 平均每天约")
          .replace("次 GitHub 收藏/天", "人收藏")
          .replace("次 GitHub 收藏 /", "人收藏 /")
          .replace("次被别人拿去改", "次被别人复制改造")
          .replace("创建于", "项目出现于")
          .replace("最近推送", "最近更新")
          .replace("被归到:", "大致归类:")
          .replace("有官网或演示页面，更容易被人试用", "有官网或演示，点开更容易看懂")
          .replace("有可以打开看的官网或演示", "有官网或演示，点开能直接看");
      }

      function getCategories(projects) {
        const counts = new Map();
        for (const project of projects) {
          const category = project.categoryZh || "未分类";
          counts.set(category, (counts.get(category) || 0) + 1);
        }
        return [...counts.entries()].sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
      }

      function filteredProjects() {
        const needle = state.query.trim().toLowerCase();
        let projects = [...(state.data?.projects || [])];
        if (state.category !== "all") {
          projects = projects.filter((project) => (project.categoryZh || "未分类") === state.category);
        }
        if (needle) {
          projects = projects.filter((project) => projectText(project).includes(needle));
        }

        const sorters = {
          ai: (a, b) => scoreValue(b, "ai") - scoreValue(a, "ai") || (b.stars || 0) - (a.stars || 0),
          web: (a, b) => scoreValue(b, "web") - scoreValue(a, "web") || (b.stars || 0) - (a.stars || 0),
          stars: (a, b) => (b.stars || 0) - (a.stars || 0) || scoreValue(b, "ai") - scoreValue(a, "ai"),
          newest: (a, b) => Date.parse(b.createdAt || 0) - Date.parse(a.createdAt || 0),
          active: (a, b) => Date.parse(b.pushedAt || 0) - Date.parse(a.pushedAt || 0),
        };
        return projects.sort(sorters[state.sort] || sorters.ai);
      }

      function avatar(project) {
        if (project.ownerAvatarUrl) {
          return `<img class="avatar" src="${escapeHtml(project.ownerAvatarUrl)}" alt="" loading="lazy">`;
        }
        const initials = (project.owner || project.fullName || "?").slice(0, 2).toUpperCase();
        return `<div class="avatar avatar-fallback" aria-hidden="true">${escapeHtml(initials)}</div>`;
      }

      function topicBadges(project, limit = 4) {
        const topics = (project.topics || [])
          .filter((topic) => /[\u3400-\u9fff]/.test(topic))
          .slice(0, limit);
        return topics.map((topic) => `<span class="badge">${escapeHtml(topic)}</span>`).join("");
      }

      function renderSegments() {
        const categories = getCategories(state.data?.projects || []);
        const buttons = [
          `<button class="segment ${state.category === "all" ? "active" : ""}" data-category="all">全部</button>`,
          ...categories.map(([name, count]) => {
            const active = state.category === name ? "active" : "";
            return `<button class="segment ${active}" data-category="${escapeHtml(name)}">${escapeHtml(
              name,
            )} ${count}</button>`;
          }),
        ];
        els.categorySegments.innerHTML = buttons.join("");
      }

      function renderMetrics(projects) {
        const all = state.data?.projects || [];
        const mobileCount = all.filter(isMobileProject).length;
        const metrics = [
          [projects.length, "本页展示"],
          [state.data?.uniqueRepos || all.length, "备选项目"],
          [mobileCount, "手机/App"],
          [state.data?.lookbackDays || "-", "观察天数"],
        ];
        els.metricGrid.innerHTML = metrics
          .map(
            ([value, name]) =>
              `<div class="metric"><span class="value">${escapeHtml(value)}</span><span class="name">${escapeHtml(
                name,
              )}</span></div>`,
          )
          .join("");
      }

      function reasonsForBoard(project, kind) {
        const primary = kind === "ai" ? project.frontierReasonsZh || [] : project.webTrendReasonsZh || [];
        return uniqueReasons([...primary, ...(project.reasonsZh || [])]).filter(
          (reason) =>
            !reason.startsWith("项目出现于") && !reason.includes(" / ") && !reason.startsWith("有官网或演示"),
        );
      }

      function trendLabels(project) {
        return uniqueText(project.trendLabelsZh || []);
      }

      function summaryText(project) {
        return project.descriptionZh || "这个项目还没有足够清晰的中文总结，建议先点开项目看 README。";
      }

      function audienceText(project) {
        return project.audienceZh || "适合想找新产品方向、竞品灵感或开源工具的人";
      }

      function highlightItems(project, limit = 3) {
        return uniqueText(project.readmeHighlightsZh || []).slice(0, limit);
      }

      function trendBadges(project, limit = 2) {
        return trendLabels(project)
          .slice(0, limit)
          .map((label) => `<span class="badge amber">${escapeHtml(label)}</span>`)
          .join("");
      }

      function topProjects(projects, kind, limit = 5) {
        return [...projects]
          .sort((a, b) => scoreValue(b, kind) - scoreValue(a, kind) || (b.stars || 0) - (a.stars || 0))
          .slice(0, limit);
      }

      function isMobileProject(project) {
        const text = [
          project.categoryZh,
          ...(project.matchedQueries || []),
          ...(project.matchedCategories || []),
          ...(project.trendLabelsZh || []),
          ...(project.webTrendReasonsZh || []),
        ].join(" ");
        return /手机|App|手机端|移动端|iOS|安卓|Flutter|跨平台移动|苹果生态|Kotlin|Expo/.test(text);
      }

      function topMobileProjects(projects, limit = 5) {
        return [...projects]
          .filter(isMobileProject)
          .sort((a, b) => scoreValue(b, "web") - scoreValue(a, "web") || (b.stars || 0) - (a.stars || 0))
          .slice(0, limit);
      }

      function renderLeaderboard(title, note, projects, kind, options = {}) {
        const items = options.mobileOnly ? topMobileProjects(projects, 5) : topProjects(projects, kind, 5);
        const scoreLabel = kind === "ai" ? "AI 潜力" : "产品看点";
        return `
          <section class="board-section">
            <div class="board-title">
              <div>
                <h2>${escapeHtml(title)}</h2>
                <p class="board-note">${escapeHtml(note)}</p>
              </div>
              <div class="result-count">前 ${items.length}</div>
            </div>
            <div class="rank-list">
              ${items
                .map((project, index) => {
                  const reasons = reasonsForBoard(project, kind).slice(0, 2);
                  return `
                    <article class="rank-card">
                      <div class="rank-index">${index + 1}</div>
                      <div>
                        <a class="project-name" href="${escapeHtml(project.url)}" target="_blank" rel="noopener noreferrer">
                          ${escapeHtml(project.fullName)}
                        </a>
                        <div class="card-meta">
                          ${escapeHtml(project.categoryZh || "未分类")} · ${numberFmt.format(project.stars || 0)} 人收藏${project.homepage ? " · 有演示可看" : ""}
                        </div>
                        <p class="description">${escapeHtml(summaryText(project))}</p>
                        <div class="audience-line">适合看的人：${escapeHtml(audienceText(project))}</div>
                        <ul class="mini-reasons">
                          ${reasons.map((reason) => `<li>${escapeHtml(reason)}</li>`).join("")}
                        </ul>
                        <div class="badges">
                          <span class="badge green">主要技术 ${escapeHtml(project.language || "-")}</span>
                          ${project.homepage ? `<span class="badge amber">有演示可看</span>` : ""}
                        </div>
                      </div>
                      <div class="rank-score">
                        <strong>${numberFmt.format(scoreValue(project, kind))}</strong>
                        <span>${escapeHtml(scoreLabel)}</span>
                      </div>
                    </article>
                  `;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function trendGroups(projects) {
        const groups = new Map();
        for (const project of projects) {
          const labels = trendLabels(project).length
            ? trendLabels(project)
            : [project.categoryZh || "未分类"];
          for (const label of labels) {
            const group = groups.get(label) || { count: 0, examples: [] };
            group.count += 1;
            if (group.examples.length < 3) group.examples.push(project);
            groups.set(label, group);
          }
        }
        return [...groups.entries()].sort((a, b) => b[1].count - a[1].count || a[0].localeCompare(b[0]));
      }

      function renderTrendSummary(projects) {
        const groups = trendGroups(projects).slice(0, 6);
        if (!groups.length) return "";
        return `
          <section class="trend-section">
            <h2>这期大家集中在做什么</h2>
            <p class="trend-note">这里不是讲代码，而是把这些项目翻译成更容易懂的产品方向。</p>
            <div class="trend-grid">
              ${groups
                .map(([label, group]) => {
                  const examples = group.examples
                    .map(
                      (project) =>
                        `<a href="${escapeHtml(project.url)}" target="_blank" rel="noopener noreferrer">${escapeHtml(project.fullName)}</a>`,
                    )
                    .join("、");
                  return `
                    <article class="trend-card">
                      <strong>${escapeHtml(label)}</strong>
                      <p>${numberFmt.format(group.count)} 个项目都碰到了这个方向。例子: ${examples}</p>
                    </article>
                  `;
                })
                .join("")}
            </div>
          </section>
        `;
      }

      function renderGuide(projects) {
        const total = projects.length;
        const mobileCount = projects.filter(isMobileProject).length;
        return `
          <section class="guide-section">
            <h2>这页帮你看什么</h2>
            <p class="guide-intro">不用懂代码。你可以把它当成一张“最近有什么新产品、新工具冒出来”的观察表。</p>
            <div class="guide-grid">
              <article class="guide-item">
                <strong>先看人话总结</strong>
                <span>每个项目会尽量读取 README，再总结它到底做什么、适合谁看。</span>
              </article>
              <article class="guide-item">
                <strong>哪些 AI 项目可能变热</strong>
                <span>看有没有很多人收藏、有没有持续更新、是不是解决了 AI 写代码或自动做事的问题。</span>
              </article>
              <article class="guide-item">
                <strong>大家最近在做什么产品</strong>
                <span>看网站、工具、工作台、设计、自动化这些方向，判断产品机会集中在哪里。</span>
              </article>
              <article class="guide-item">
                <strong>手机和 App 单独列出来</strong>
                <span>本页 ${numberFmt.format(total)} 个项目里，有 ${numberFmt.format(mobileCount)} 个和手机或 App 有关。</span>
              </article>
            </div>
          </section>
        `;
      }

      function renderProject(project, index) {
        const reasons = uniqueReasons([
          ...(project.frontierReasonsZh || []),
          ...(project.webTrendReasonsZh || []),
          ...(project.reasonsZh || []),
        ])
          .filter((reason) => !reason.startsWith("项目出现于") && !reason.includes(" / "))
          .filter((reason) => !reason.startsWith("有官网或演示"))
          .slice(0, 4);
        const homepage = project.homepage
          ? `<a class="btn" href="${escapeHtml(project.homepage)}" target="_blank" rel="noopener noreferrer">打开演示</a>`
          : "";
        const highlights = highlightItems(project, 3);
        return `
          <article class="project-card">
            <div>
              <div class="project-head">
                ${avatar(project)}
                <div>
                  <a class="project-name" href="${escapeHtml(project.url)}" target="_blank" rel="noopener noreferrer">
                    ${index + 1}. ${escapeHtml(project.fullName)}
                  </a>
                  <div class="card-meta">
                    ${escapeHtml(project.categoryZh || "未分类")} · ${numberFmt.format(project.stars || 0)} 人收藏 · 出现 ${relativeTime(project.createdAt)} · 更新 ${relativeTime(project.pushedAt)}
                  </div>
                </div>
              </div>
              <div class="plain-summary">
                <strong>它到底做什么</strong>
                <p>${escapeHtml(summaryText(project))}</p>
                <div class="audience-line">适合看的人：${escapeHtml(audienceText(project))}</div>
                <div class="source-note">总结来源：${escapeHtml(project.summarySourceZh || "GitHub 简介 + 项目信号")}</div>
              </div>
              ${
                highlights.length
                  ? `<ul class="highlight-list">${highlights.map((item) => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
                  : ""
              }
              <div class="badges">
                <span class="badge green">主要技术 ${escapeHtml(project.language || "-")}</span>
                ${project.homepage ? `<span class="badge amber">有演示可看</span>` : ""}
                ${topicBadges(project, 6)}
              </div>
              <ul class="reason-list">
                ${reasons.map((reason) => `<li>${escapeHtml(reason)}</li>`).join("")}
              </ul>
            </div>
            <div class="scorebox">
              <div class="score-item"><strong>${numberFmt.format(scoreValue(project, "ai"))}</strong><span>AI 潜力</span></div>
              <div class="score-item"><strong>${numberFmt.format(scoreValue(project, "web"))}</strong><span>产品看点</span></div>
              <div class="score-item"><strong>${numberFmt.format(project.stars || 0)}</strong><span>收藏</span></div>
              <div class="score-item"><strong>${formatDate(project.createdAt)}</strong><span>出现</span></div>
              <a class="btn primary" href="${escapeHtml(project.url)}" target="_blank" rel="noopener noreferrer">打开项目</a>
              ${homepage}
            </div>
          </article>
        `;
      }

      function render() {
        if (!state.data) return;
        const projects = filteredProjects();
        renderSegments();
        renderMetrics(projects);

        els.brandMeta.textContent = `最近 ${state.data.lookbackDays} 天 · ${numberFmt.format((state.data.projects || []).length)} 个项目 · 来自 GitHub`;
        els.summaryTitle.textContent = `${state.data.date} 这期值得看什么`;
        els.summaryText.textContent = `我从最近 ${state.data.lookbackDays} 天新出现的 GitHub 项目里挑出 ${numberFmt.format(
          (state.data.projects || []).length,
        )} 个。先看三块: AI 可能会火、大家在做的产品、手机/App 项目。`;
        els.statusPill.textContent = `从 ${state.data.since} 开始`;
        els.markdownLink.href = `./digests/${state.data.date}/new-projects.md`;

        if (!projects.length) {
          els.contentArea.innerHTML = `<div class="empty">没有匹配当前条件的项目。</div>`;
          return;
        }

        els.contentArea.innerHTML = `
          ${renderGuide(projects)}
          <div class="leaderboard-grid">
            ${renderLeaderboard("AI 可能会火", "适合先看有没有新的 AI 机会", projects, "ai")}
            ${renderLeaderboard("大家在做的产品", "看最近产品方向集中在哪里", projects, "web")}
            ${renderLeaderboard("手机/App 项目", "把手机端和 App 相关项目单独放一起", projects, "web", { mobileOnly: true })}
          </div>
          ${renderTrendSummary(projects)}
          <div class="section-head">
            <h2>全部项目</h2>
            <div class="result-count">${projects.length} / ${(state.data.projects || []).length}</div>
          </div>
          <div class="project-list">${projects.map(renderProject).join("")}</div>
        `;
      }

      async function loadDate(date) {
        state.selectedDate = date;
        history.replaceState(null, "", `#${date}`);
        els.contentArea.innerHTML = `<div class="loading">加载中...</div>`;
        const embedded = embeddedPayload();
        if (embedded?.digests?.[date]) {
          state.data = embedded.digests[date];
          state.category = "all";
          render();
          return;
        }
        const response = await fetch(`./digests/${date}/new-projects.json`);
        if (!response.ok) throw new Error(`new-projects.json ${response.status}`);
        state.data = await response.json();
        state.category = "all";
        render();
      }

      async function boot() {
        try {
          let manifest;
          const embedded = embeddedPayload();
          try {
            const manifestResponse = await fetch("./manifest.json");
            if (!manifestResponse.ok) throw new Error("manifest.json not found");
            manifest = await manifestResponse.json();
          } catch (fetchError) {
            if (!embedded?.dates?.length) throw fetchError;
            manifest = { dates: embedded.dates };
          }

          state.dates = (manifest.dates || []).filter((entry) =>
            (entry.reports || []).includes("new-projects"),
          );
          if (!state.dates.length) throw new Error("no new-projects report");

          els.dateSelect.innerHTML = dateOptions(state.dates);

          const hashDate = location.hash.slice(1);
          const initial = state.dates.find((entry) => entry.date === hashDate)?.date || state.dates[0].date;
          els.dateSelect.value = initial;
          await loadDate(initial);
        } catch (error) {
          els.contentArea.innerHTML = `<div class="error">${escapeHtml(error.message || error)}</div>`;
          els.summaryTitle.textContent = "加载失败";
          els.summaryText.textContent = "请确认 manifest.json 和 digests 目录已经生成。";
        }
      }

      els.dateSelect.addEventListener("change", () => loadDate(els.dateSelect.value));
      els.searchInput.addEventListener("input", () => {
        state.query = els.searchInput.value;
        render();
      });
      els.sortSelect.addEventListener("change", () => {
        state.sort = els.sortSelect.value;
        render();
      });
      els.categorySegments.addEventListener("click", (event) => {
        const button = event.target.closest("[data-category]");
        if (!button) return;
        state.category = button.dataset.category;
        render();
      });

      boot();
    </script>
  </body>
</html>
